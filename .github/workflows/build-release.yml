name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  workflow_dispatch:

env:
  PLUGIN_NAME: Coppelia
  SOLUTION_NAME: Coppelia
  INTERNAL_NAME: Coppelia
  RELEASE_DIR: Coppelia\bin\x64\Release\Coppelia
  DALAMUD_DISTRIB_COMMIT: 4b9175ec411f15a84f4d59dc24881095aef2d999
  DALAMUD_EXPECTED_VERSION: "15.0.2.2"
  DALAMUD_EXPECTED_GIT_SHA: 4a6abae25b8a156a102ed3869429ef026a3d7cfe
  DALAMUD_EXPECTED_REVISION: "7312"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/goatcorp/dalamud-distrib/${{ env.DALAMUD_DISTRIB_COMMIT }}/stg/latest.zip" -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"
          $dalamudDir = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          $actualVersion = (Get-Item "$dalamudDir\Dalamud.dll").VersionInfo.FileVersion
          $actualGitSha = (Get-Content "$dalamudDir\commit_hash.txt" -Raw).Trim()
          $actualRevision = (Get-Content "$dalamudDir\revision.txt" -Raw).Trim()
          Write-Host "Dalamud version: $actualVersion"
          Write-Host "Dalamud Git SHA: $actualGitSha"
          Write-Host "Dalamud revision: $actualRevision"
          if ($actualVersion -ne $env:DALAMUD_EXPECTED_VERSION) {
            throw "Unexpected Dalamud version: expected $env:DALAMUD_EXPECTED_VERSION, got $actualVersion"
          }
          if ($actualGitSha -ne $env:DALAMUD_EXPECTED_GIT_SHA) {
            throw "Unexpected Dalamud Git SHA: expected $env:DALAMUD_EXPECTED_GIT_SHA, got $actualGitSha"
          }
          if ($actualRevision -ne $env:DALAMUD_EXPECTED_REVISION) {
            throw "Unexpected Dalamud revision: expected $env:DALAMUD_EXPECTED_REVISION, got $actualRevision"
          }

      - name: Build
        run: |
          dotnet restore -r win "${{ env.SOLUTION_NAME }}.sln"
          dotnet build "${{ env.SOLUTION_NAME }}.sln" --configuration Release --no-restore -p:Platform=x64
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PLUGIN_NAME }}-artifact
          path: |
            ${{ env.RELEASE_DIR }}\latest.zip
            ${{ env.RELEASE_DIR }}\${{ env.INTERNAL_NAME }}.json
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.PLUGIN_NAME }}-artifact
          path: artifact

      - name: Determine Release Version
        id: get_version
        shell: bash
        env:
          INTERNAL_NAME: ${{ env.INTERNAL_NAME }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            version="$(python3 -c "import json, os; from pathlib import Path; manifest_path = Path('artifact') / f\"{os.environ['INTERNAL_NAME']}.json\"; manifest = json.loads(manifest_path.read_text(encoding='utf-8')); manifest = manifest[0] if isinstance(manifest, list) else manifest; print(f\"v{manifest['AssemblyVersion']}\")")"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifact/latest.zip
            artifact/${{ env.INTERNAL_NAME }}.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
